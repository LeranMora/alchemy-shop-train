<!DOCTYPE html>
<html>
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алхимия</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <div class="header">
            <h1 class="menu-title">Лавка алхимика "Мандргора"</h1>
            <button id="start-game" class="game-btn">Начать игру</button>
            <button id="load-game" class="game-btn">Загрузить игру</button>
            <button id="list-menu" class="game-btn">Книга рецептов</button>
            <button id="close" class="game-btn" style="display:none">Назад</button>
            <button id="save-game" class="game-btn" style="display:none">Сохранить игру</button>
            <button id="delete-game" class="game-btn" style="display:none"> Удалить игру</button>
            <button id="statistics-game" class:"game-btn"style="display:none">Статистика</button>
        </div>

        <div class="scrollable">
            <div id="screen-main-menu" style="display: none;"></div>
        </div>

        <div class="footer"> <!-- style="display:none" в главном меню-->
            <div>
                <div> lvl: 0 (0 / 100) <!--peremennaya--></div>
                <div>Gold: 100</div>
            </div>
            <div>
                <div>Репутация лавки: 0</div>
                <div>✾ Чистота лавки ✾: 0</div>
            </div>
            <button id="main-menu-btn" class="game-btn">Главное меню</button>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>

</body>
</html>
